# Deployed to /etc/nginx/sites-available/app.kindredtodo.com on the droplet.
# Serves the desktop/ Vite SPA as static files; proxies /api to the backend
# container (same /api-stripping rewrite as kindredtodo.com).

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.kindredtodo.com;

    return 308 https://$server_name$request_uri;
}

# HTTPS - Kindred web app (static SPA)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.kindredtodo.com;

    ssl_certificate /etc/letsencrypt/live/app.kindredtodo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.kindredtodo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/kindred-app;
    index index.html;

    # Hashed Vite assets are immutable — cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend API — copied from kindredtodo.com (strips /api prefix)
    location ~ ^/api(?:/(.*))?$ {
        proxy_method $request_method;
        rewrite ^/api(?:/(.*))?$ /$1 break;
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;

        proxy_pass_request_body on;
        proxy_pass_request_headers on;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback — every other path serves index.html (BrowserRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
