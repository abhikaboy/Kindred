name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Single-node replica set so MongoDB transactions work (the plain `services`
      # mongo container can't run with --replSet). Tests connect with
      # directConnection=true to skip replica-set host discovery.
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '7.0'
          mongodb-replica-set: rs0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run unit tests
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/?directConnection=true
          TEST_MONGO_URI: mongodb://localhost:27017/?directConnection=true
        run: go test -short -v -race -coverprofile=coverage.out ./...

      - name: Run integration tests (excluding spaces)
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/?directConnection=true
          TEST_MONGO_URI: mongodb://localhost:27017/?directConnection=true
        run: go test -v -race ./internal/handlers/connection ./internal/handlers/post ./internal/handlers/blueprint ./internal/handlers/category ./internal/handlers/congratulation ./internal/handlers/encouragement ./internal/handlers/group ./internal/handlers/notifications ./internal/handlers/profile ./internal/handlers/report ./internal/handlers/settings ./internal/handlers/waitlist

      - name: Generate coverage report
        working-directory: backend
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.html

      - name: Check test coverage
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total test coverage: ${COVERAGE}%"
          # Optionally fail if coverage is below threshold
          # if (( $(echo "$COVERAGE < 50" | bc -l) )); then
          #   echo "Coverage is below 50%"
          #   exit 1
          # fi

  lint:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint from source
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        working-directory: backend
        run: golangci-lint run --timeout=5m

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      # Add frontend tests when available
      # - name: Run frontend tests
      #   working-directory: frontend
      #   run: bun test

      - name: Type check
        working-directory: frontend
        run: bun run tsc --noEmit || true

  api-contract-drift:
    name: API Contract Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache-dependency-path: backend/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Regenerate OpenAPI spec from backend source
        working-directory: backend
        run: go run ./cmd/server --generate-openapi --openapi-output="../frontend/api/api-spec.yaml"

      - name: Regenerate frontend types from spec
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run generate-types

      - name: Fail if committed spec or types are stale
        run: |
          if ! git diff --exit-code frontend/api/api-spec.yaml frontend/api/generated/types.ts; then
            echo "::error::OpenAPI spec / frontend types are out of date with the backend. Run 'make generate-api' and commit the result."
            exit 1
          fi
