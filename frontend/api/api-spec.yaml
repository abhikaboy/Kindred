components:
    schemas:
        AcceptConnectionOutputBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/AcceptConnectionOutputBody.json
                    readOnly: true
                message:
                    type: string
                    examples:
                        - Connection request accepted successfully
            required:
                - message
        AcceptTermsOutputBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/AcceptTermsOutputBody.json
                    readOnly: true
                message:
                    type: string
                    examples:
                        - Terms accepted successfully
                terms_accepted_at:
                    type: string
                terms_version:
                    type: string
            required:
                - message
                - terms_accepted_at
                - terms_version
        AcceptTermsRequest:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/AcceptTermsRequest.json
                    readOnly: true
                terms_version:
                    type: string
                    description: Version of terms being accepted
                    examples:
                        - "1.0"
            required:
                - terms_version
        ActivateTaskOutputBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/ActivateTaskOutputBody.json
                    readOnly: true
                message:
                    type: string
                    examples:
                        - Task activation status updated successfully
            required:
                - message
        ActivityDay:
            type: object
            additionalProperties: false
            properties:
                count:
                    type: integer
                    format: int64
                day:
                    type: integer
                    format: int64
                level:
                    type: integer
                    format: int64
            required:
                - day
                - count
                - level
        ActivityDocument:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/ActivityDocument.json
                    readOnly: true
                _id:
                    type: string
                days:
                    type: array
                    items:
                        $ref: '#/components/schemas/ActivityDay'
                lastUpdated:
                    type: string
                    format: date-time
                month:
                    type: integer
                    format: int64
                totalCount:
                    type: integer
                    format: int64
                user:
                    type: string
                year:
                    type: integer
                    format: int64
            required:
                - _id
                - user
                - year
                - month
                - days
                - totalCount
                - lastUpdated
        AddCommentOutputBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/AddCommentOutputBody.json
                    readOnly: true
                comment:
                    $ref: '#/components/schemas/CommentDocumentAPI'
                message:
                    type: string
                    examples:
                        - Comment added successfully
            required:
                - message
