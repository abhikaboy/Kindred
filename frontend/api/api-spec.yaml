    /v1/calendar/oauth2/callback:
        get:
            tags:
                - Calendar
            summary: Google Calendar OAuth callback
            description: Handles OAuth callback from Google. This is called by Google after user grants permissions. This endpoint is NOT behind auth middleware since Google calls it directly.
            operationId: google-calendar-oauth-callback
            parameters:
                - name: code
                  in: query
                  required: true
                  explode: false
                  schema:
                    type: string
                - name: state
                  in: query
                  required: true
                  explode: false
                  schema:
                    type: string
                - name: error
                  in: query
                  explode: false
                  schema:
                    type: string
            responses:
                "204":
                    description: No Content
                    headers:
                        Location:
                            schema:
                                type: string
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/calendar/webhook/{connection_id}:
        post:
            tags:
                - Calendar
            summary: Google Calendar webhook receiver
            description: Receives push notifications from Google Calendar API. This endpoint is NOT behind auth middleware since Google calls it directly.
            operationId: calendar-webhook
            parameters:
                - name: connection_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: X-Goog-Channel-ID
                  in: header
                  schema:
                    type: string
                - name: X-Goog-Resource-ID
                  in: header
                  schema:
                    type: string
                - name: X-Goog-Resource-State
                  in: header
                  schema:
                    type: string
                - name: X-Goog-Resource-URI
                  in: header
                  schema:
                    type: string
                - name: X-Goog-Message-Number
                  in: header
                  schema:
                    type: string
                - name: X-Goog-Channel-Token
                  in: header
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebhookOutputBody'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
