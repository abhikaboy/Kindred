    /v1/auth/logout:
        post:
            tags:
                - auth
            summary: User logout
            description: Logout user and invalidate tokens
            operationId: logout
            parameters:
                - name: Authorization
                  in: header
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
