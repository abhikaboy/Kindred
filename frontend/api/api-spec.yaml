openapi: 3.1.0
info:
    title: Kindred API
    description: Kindred API built with Huma v2 and Fiber
    version: 1.0.0
paths:
    /v1/activity:
        get:
            tags:
                - activities
            summary: Get all activities
            description: Retrieve all activity records
            operationId: get-activities
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/ActivityDocument'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/activity/{id}:
        get:
            tags:
                - activities
            summary: Get activity by ID
            description: Retrieve a specific activity by its ID
            operationId: get-activity
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
                    examples:
                        - 507f1f77bcf86cd799439011
                  example: 507f1f77bcf86cd799439011
                - name: year
                  in: query
                  explode: false
                  schema:
                    type: integer
                    format: int64
                    examples:
                        - 2024
                  example: 2024
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ActivityDocument'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/activity/user/{userID}:
        get:
            tags:
                - activities
            summary: Get activity by user and period
            description: Retrieve activity for a specific user, year, and month
            operationId: get-activity-by-user-and-period
            parameters:
                - name: userID
                  in: path
                  required: true
                  schema:
                    type: string
                    examples:
                        - 507f1f77bcf86cd799439011
                  example: 507f1f77bcf86cd799439011
                - name: year
                  in: query
                  explode: false
                  schema:
                    type: integer
                    format: int64
                    examples:
                        - 2024
                  example: 2024
                - name: month
                  in: query
                  explode: false
                  schema:
                    type: integer
                    format: int64
                    examples:
                        - 12
                  example: 12
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ActivityDocument'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/activity/user/{userID}/recent:
        get:
            tags:
                - activities
            summary: Get recent activity
            description: Retrieve the user's activity for the last 8 days
            operationId: get-recent-activity
            parameters:
                - name: userID
                  in: path
                  required: true
                  schema:
                    type: string
                    examples:
                        - 507f1f77bcf86cd799439011
                  example: 507f1f77bcf86cd799439011
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/ActivityDocument'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/activity/user/{userID}/year:
        get:
            tags:
                - activities
            summary: Get activity by user and year
            description: Retrieve all activity for a specific user and year
            operationId: get-activity-by-user-and-year
            parameters:
                - name: userID
                  in: path
                  required: true
                  schema:
                    type: string
                    examples:
                        - 507f1f77bcf86cd799439011
                  example: 507f1f77bcf86cd799439011
                - name: year
                  in: query
                  explode: false
                  schema:
                    type: integer
                    format: int64
                    examples:
                        - 2024
                  example: 2024
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/ActivityDocument'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/admin/reports:
        get:
            tags:
                - reports
            summary: Get reports
            description: Retrieve content reports for moderation (admin only)
            operationId: get-reports
            parameters:
                - name: Authorization
                  in: header
                  description: Bearer token for authentication
                  required: true
                  schema:
                    type: string
                    description: Bearer token for authentication
                - name: status
                  in: query
                  description: Filter by status (pending, reviewed, resolved)
                  explode: false
                  schema:
                    type: string
                    description: Filter by status (pending, reviewed, resolved)
                    examples:
                        - pending
                  example: pending
                - name: limit
                  in: query
                  description: Number of reports to return
                  explode: false
                  schema:
                    type: integer
                    description: Number of reports to return
                    format: int64
                    examples:
                        - 50
                  example: 50
                - name: offset
                  in: query
                  description: Offset for pagination
                  explode: false
                  schema:
                    type: integer
                    description: Offset for pagination
                    format: int64
                    examples:
                        - 0
                  example: 0
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetReportsOutputBody'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/assets/{key}/url:
        get:
            tags:
                - assets
            summary: Get presigned URL for asset download
            description: Get a presigned URL to download an asset from S3
            operationId: get-presigned-url
            parameters:
                - name: key
                  in: path
                  required: true
                  schema:
                    type: string
                    examples:
                        - profile-pictures/user123.jpg
                  example: profile-pictures/user123.jpg
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema: {}
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/assets/upload:
        post:
            tags:
                - assets
            summary: Create presigned URL for asset upload
            description: Create a presigned URL to upload an asset to S3
            operationId: create-presigned-url
            parameters:
                - name: fileType
                  in: query
                  required: true
                  explode: false
                  schema:
                    type: string
                    examples:
                        - image/jpeg
                  example: image/jpeg
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema: {}
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /v1/auth/login:
        post:
            tags:
                - auth
            summary: User login
            description: Authenticate user with email and password
            operationId: login
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
                required: true
            responses:
                "200":
                    description: OK
                    headers:
                        access_token:
                            schema:
                                type: string
                        refresh_token:
                            schema:
                                type: string
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SafeUser'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
